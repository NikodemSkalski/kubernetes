name: 'deployaks'

on:
  workflow_dispatch:

permissions:
  contents: read


jobs:
  bicepdeploy:
    name: 'Storage account Deploment and validation'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4        

      - name: Azure login
        uses: azure/login@v2
        with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep
        uses: Azure/bicep-deploy@v2.3.0
        with:
          type: deployment
          operation: 'validate'
          scope: 'resourceGroup'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ vars.AZURE_RESOURCE_GROUP }}
          bicep-file: '${{ github.workspace }}/bicep/ACR/acr.deployment.bicep'
          parameters-file: '${{ github.workspace }}/bicep/ACR/environments/dev.bicepparam'

      - name:  Deploy Bicep
        uses: Azure/bicep-deploy@v2.3.0
        with:
          type: deployment
          operation: 'create'
          name: 'acrDeploymentDev'
          scope: 'resourceGroup'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ vars.AZURE_RESOURCE_GROUP }}
          bicep-file: '${{ github.workspace }}/bicep/ACR/acr.deployment.bicep'
          parameters-file: '${{ github.workspace }}/bicep/ACR/environments/dev.bicepparam'

      - name: Set ACR Admin Login and Password as GitHub Secrets
        uses: azure/CLI@v1
        with:
          inlineScript: |
            ACR_NAME=$(az deployment group show --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --name acrDeploymentDev --query "properties.outputs.registryLoginServer.value" -o tsv)
            ACR_ADMIN_USERNAME=$(az acr credential show --name $ACR_NAME --query "username" -o tsv)
            ACR_ADMIN_PASSWORD=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)
            echo "ACR_NAME=$ACR_NAME"
            echo "::add-mask::$ACR_ADMIN_USERNAME"
            echo "::add-mask::$ACR_ADMIN_PASSWORD"
            gh secret set ACR_NAME --repo NikodemSkalski/devops-labs --body "$ACR_NAME"
            gh secret set ACR_ADMIN_USERNAME --repo NikodemSkalski/devops-labs --body "$ACR_ADMIN_USERNAME"
            gh secret set ACR_ADMIN_PASSWORD --repo NikodemSkalski/devops-labs --body "$ACR_ADMIN_PASSWORD"